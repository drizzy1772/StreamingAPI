






name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

  
jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: analytics_db
        ports:
          - 5432:5432
    
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - name: Check code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
            python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Create test database
        env:
          PGPASSWORD: postgres
        run: psql -h localhost -U postgres -c "CREATE DATABASE test_db;"

      - name: Run tests
        env:
          TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/analytics_db
        run: pytest tests/ -v

      - name: Start FastAPI and run health check
        env:
            DATABASE_URL: postgresql://postgres:postgres@localhost:5432/analytics_db
            REDIS_URL: redis://localhost:6379/0
        run: |
          uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          sleep 3
          curl -f http://localhost:8000/ || exit 1
